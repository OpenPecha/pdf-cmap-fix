<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">PDF to font map to Unicode hero illustration</title>
  <desc id="desc">Minimal diagram showing PDF input transformed through a font map into correct Tibetan Unicode text output.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#071327"/>
      <stop offset="100%" stop-color="#102645"/>
    </linearGradient>
    <marker id="arrow" markerWidth="14" markerHeight="10" refX="12" refY="5" orient="auto">
      <path d="M0,0 L14,5 L0,10 Z" fill="#f4f7ff"/>
    </marker>
    <style>
      .panel { fill: #142c4e; stroke: #2e4d79; stroke-width: 2; rx: 26; }
      .label { fill: #eaf1ff; font-family: 'Inter', 'Segoe UI', Arial, sans-serif; font-size: 36px; font-weight: 600; }
      .small { fill: #9fb4d8; font-family: 'Inter', 'Segoe UI', Arial, sans-serif; font-size: 20px; }
      .tibetan { fill: #ffffff; font-family: 'Noto Sans Tibetan', 'Microsoft Himalaya', 'Jomolhari', sans-serif; font-size: 56px; font-weight: 400; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <rect x="120" y="230" width="360" height="430" class="panel"/>
  <rect x="620" y="230" width="360" height="430" class="panel"/>
  <rect x="1120" y="230" width="360" height="430" class="panel"/>

  <g transform="translate(185 290)">
    <rect x="0" y="0" width="230" height="280" rx="20" fill="#f4f7ff"/>
    <path d="M166 0 L230 64 L230 0 Z" fill="#cedcf2"/>
    <path d="M166 0 L166 64 L230 64" fill="none" stroke="#2a68d8" stroke-width="8" stroke-linejoin="round"/>
    <rect x="38" y="90" width="154" height="10" rx="5" fill="#b5c3d9"/>
    <rect x="38" y="122" width="154" height="10" rx="5" fill="#b5c3d9"/>
    <rect x="38" y="154" width="154" height="10" rx="5" fill="#b5c3d9"/>
    <rect x="38" y="186" width="120" height="10" rx="5" fill="#b5c3d9"/>
  </g>
  <text x="300" y="610" text-anchor="middle" class="label">PDF</text>

  <g transform="translate(684 292)">
    <rect x="0" y="0" width="232" height="232" rx="14" fill="#0d1f38" stroke="#7b93bb" stroke-width="3"/>
    <g fill="#f4f7ff" opacity="0.9">
      <rect x="20" y="20" width="14" height="14"/><rect x="52" y="20" width="8" height="14"/><rect x="84" y="20" width="10" height="14"/><rect x="116" y="20" width="14" height="14"/><rect x="148" y="20" width="8" height="14"/><rect x="180" y="20" width="14" height="14"/>
      <rect x="20" y="52" width="10" height="14"/><rect x="52" y="52" width="14" height="14"/><rect x="84" y="52" width="14" height="14"/><rect x="116" y="52" width="8" height="14"/><rect x="148" y="52" width="14" height="14"/><rect x="180" y="52" width="10" height="14"/>
      <rect x="20" y="84" width="14" height="14"/><rect x="52" y="84" width="10" height="14"/><rect x="84" y="84" width="8" height="14"/><rect x="116" y="84" width="14" height="14"/><rect x="148" y="84" width="14" height="14"/><rect x="180" y="84" width="8" height="14"/>
      <rect x="20" y="116" width="8" height="14"/><rect x="52" y="116" width="14" height="14"/><rect x="84" y="116" width="10" height="14"/><rect x="116" y="116" width="14" height="14"/><rect x="148" y="116" width="8" height="14"/><rect x="180" y="116" width="14" height="14"/>
      <rect x="20" y="148" width="14" height="14"/><rect x="52" y="148" width="8" height="14"/><rect x="84" y="148" width="14" height="14"/><rect x="116" y="148" width="10" height="14"/><rect x="148" y="148" width="14" height="14"/><rect x="180" y="148" width="8" height="14"/>
      <rect x="20" y="180" width="10" height="14"/><rect x="52" y="180" width="14" height="14"/><rect x="84" y="180" width="8" height="14"/><rect x="116" y="180" width="14" height="14"/><rect x="148" y="180" width="10" height="14"/><rect x="180" y="180" width="14" height="14"/>
    </g>
  </g>
  <text x="800" y="610" text-anchor="middle" class="label">Font map</text>
  <text x="800" y="640" text-anchor="middle" class="small">GID -> Unicode</text>

  <text x="1300" y="390" text-anchor="middle" class="tibetan">????????????????????</text>
  <text x="1300" y="472" text-anchor="middle" class="tibetan">??????????????????????</text>
  <text x="1300" y="610" text-anchor="middle" class="label">Unicode</text>

  <line x1="490" y1="445" x2="600" y2="445" stroke="#f4f7ff" stroke-width="8" marker-end="url(#arrow)"/>
  <line x1="990" y1="445" x2="1100" y2="445" stroke="#f4f7ff" stroke-width="8" marker-end="url(#arrow)"/>

  <rect x="120" y="90" width="520" height="96" rx="16" fill="#0a1d37" opacity="0.95"/>
  <text x="150" y="148" class="label" style="font-size:44px;">PDF + Font map -> Unicode</text>
</svg>
